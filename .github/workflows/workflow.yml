name: GITHUB ACTIONS WORKFLOW

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots package
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sheet-herder-api:latest

      - name: Trigger Watchtower webhook
        env:
          WATCHTOWER_SSH_KEY: ${{ secrets.WATCHTOWER_SSH_KEY }}
          WATCHTOWER_DROPLET_IP: ${{ secrets.WATCHTOWER_DROPLET_IP }}
          WATCHTOWER_DROPLET_USER: ${{ secrets.WATCHTOWER_DROPLET_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$WATCHTOWER_SSH_KEY" > ~/.ssh/watchtower_deploy
          chmod 600 ~/.ssh/watchtower_deploy
          ssh-keyscan -H "$WATCHTOWER_DROPLET_IP" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/watchtower_deploy "$WATCHTOWER_DROPLET_USER@$WATCHTOWER_DROPLET_IP"
